services:
  - type: web
    name: spywords-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /admin/
    envVars:
      - key: DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: spywords-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://spywords.vercel.app
      - key: USE_IN_MEMORY_CHANNEL_LAYER
        value: "0"
      - key: REDIS_URL
        value: redis://default:password@host:6379/0
          name: spywords-redis

          property: connectionString

